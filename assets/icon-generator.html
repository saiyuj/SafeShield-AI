<!DOCTYPE html>
<html>
<head>
<style>
* { margin:0; padding:0; }
body { background: transparent; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Background
const bg = ctx.createRadialGradient(512, 512, 0, 512, 512, 512);
bg.addColorStop(0, '#1C1C1E');
bg.addColorStop(1, '#111111');
ctx.fillStyle = bg;
ctx.roundRect(0, 0, 1024, 1024, 200);
ctx.fill();

// Glow
const glow = ctx.createRadialGradient(512, 480, 0, 512, 480, 300);
glow.addColorStop(0, 'rgba(255,224,51,0.3)');
glow.addColorStop(1, 'rgba(255,224,51,0)');
ctx.fillStyle = glow;
ctx.fillRect(0, 0, 1024, 1024);

// Outer ring
ctx.beginPath();
ctx.arc(512, 480, 340, 0, Math.PI * 2);
ctx.strokeStyle = 'rgba(255,224,51,0.2)';
ctx.lineWidth = 3;
ctx.stroke();

// Middle ring
ctx.beginPath();
ctx.arc(512, 480, 280, 0, Math.PI * 2);
ctx.strokeStyle = 'rgba(255,224,51,0.3)';
ctx.lineWidth = 4;
ctx.stroke();

// Inner circle
const inner = ctx.createRadialGradient(512, 450, 0, 512, 480, 200);
inner.addColorStop(0, '#FFE033');
inner.addColorStop(1, '#F0C000');
ctx.beginPath();
ctx.arc(512, 480, 200, 0, Math.PI * 2);
ctx.fillStyle = inner;
ctx.fill();

// Shield shape
ctx.beginPath();
ctx.moveTo(512, 280);
ctx.bezierCurveTo(512, 280, 680, 330, 680, 460);
ctx.bezierCurveTo(680, 580, 600, 640, 512, 680);
ctx.bezierCurveTo(424, 640, 344, 580, 344, 460);
ctx.bezierCurveTo(344, 330, 512, 280, 512, 280);
ctx.fillStyle = '#111111';
ctx.fill();

// Checkmark
ctx.beginPath();
ctx.moveTo(420, 480);
ctx.lineTo(490, 560);
ctx.lineTo(620, 400);
ctx.strokeStyle = '#FFE033';
ctx.lineWidth = 45;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';
ctx.stroke();

// SafeShield text
ctx.font = 'bold 72px Arial';
ctx.fillStyle = 'white';
ctx.textAlign = 'center';
ctx.fillText('SafeShield', 512, 820);

ctx.font = '40px Arial';
ctx.fillStyle = 'rgba(255,224,51,0.8)';
ctx.fillText('AI Safety', 512, 880);

document.body.innerHTML = '<img src="' + c.toDataURL() + '" style="width:400px">';
</script>
</body>
</html>
